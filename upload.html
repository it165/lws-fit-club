<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ส่งผลก้าวเดิน - LWS FIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 40px; }
    * { -webkit-tap-highlight-color: transparent; }
    .container { max-width: 480px !important; margin: 0 auto; padding: 0 15px; }
    .card { border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: none; margin-top: 20px; }
    
    .upload-box { border: 2px dashed #ced4da; border-radius: 12px; padding: 30px 20px; text-align: center; background-color: #f8f9fa; cursor: pointer; margin-bottom: 15px; position: relative; }
    .upload-box:active { background-color: #e2e3e5; }
    .preview-img { max-width: 100%; max-height: 200px; border-radius: 8px; display: none; margin: 0 auto; }
    
    .btn-submit { background-color: #198754; color: white; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; margin-bottom: 10px; }
    .btn-back { background-color: #e9ecef; color: #495057; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h5 class="fw-bold text-success">👣 ส่งผลก้าวเดินประจำวัน</h5>
      <small class="text-muted">อัปโหลดรูปภาพหน้าจอแอปนับก้าวของคุณ</small>
    </div>

    <form id="uploadForm">
      
      <!-- ช่องกรอกจำนวนก้าว -->
      <div class="mb-4">
        <label class="form-label fw-bold">จำนวนก้าวที่เดินได้ (ก้าว)</label>
        <input type="number" class="form-control form-control-lg text-center fw-bold text-primary" id="stepCount" required placeholder="เช่น 8500" min="1">
      </div>

      <!-- กล่องอัปโหลดรูปภาพ -->
      <label class="form-label fw-bold">แนบรูปภาพหลักฐาน</label>
      <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div id="uploadPrompt">
          <h1 class="mb-2">📸</h1>
          <span class="text-primary fw-bold">แตะเพื่อเลือกรูปภาพ</span>
        </div>
        <img id="imagePreview" class="preview-img">
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="previewFile()">

      <button type="submit" class="btn-submit" id="submitBtn">ยืนยันการส่งผล</button>
      <button type="button" class="btn-back" onclick="window.location.href='index.html'">กลับหน้าแรก</button>
      
    </form>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const currentUid = urlParams.get('uid');
  
  // 🚨 ใส่ลิงก์ Deploy ของคุณตรงนี้
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw0jdlT9JewPZLbAOtKvdpE3bxFkMM6qXFRWoWZH5RmDgxt3w_A9nUrV1uJ_cNJFFW6qA/exec"; 
  let base64String = "";
  let fileType = "";
  let fileName = "";

  window.onload = function() {
    if(!currentUid) {
      Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูล', text: 'กรุณาเข้าใช้งานผ่านเมนูใน LINE' })
        .then(() => { window.location.href = 'index.html'; });
    }
  };

  // ฟังก์ชันแสดงรูปตัวอย่างและแปลงเป็น Base64
  function previewFile() {
    const file = document.getElementById('fileInput').files[0];
    if (file) {
      fileName = file.name;
      fileType = file.type;
      
      const reader = new FileReader();
      reader.onloadend = function() {
        // แสดงรูป
        document.getElementById('imagePreview').src = reader.result;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadPrompt').style.display = 'none';
        
        // เก็บค่า Base64 (ตัดส่วนหัวที่เป็น data:image... ออก)
        base64String = reader.result.split(',')[1];
      }
      reader.readAsDataURL(file);
    }
  }

  // ฟังก์ชันส่งข้อมูล
  document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const steps = document.getElementById('stepCount').value;
    
    if (!base64String) {
      Swal.fire('แจ้งเตือน', 'กรุณาแนบรูปภาพหลักฐานด้วยครับ', 'warning');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังอัปโหลด...';
    btn.disabled = true;

    const payload = {
      action: "uploadSteps",
      userId: currentUid,
      steps: steps,
      fileName: fileName,
      mimeType: fileType,
      imageBase64: base64String
    };

    fetch(GAS_URL, {
      redirect: "follow",
      method: 'POST',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(result => {
      if (result.status === "success") {
        Swal.fire('สำเร็จ! 🎉', 'ส่งผลก้าวเดินเรียบร้อยแล้ว', 'success')
          .then(() => { window.location.href = 'index.html'; });
      } else {
        Swal.fire('ผิดพลาด', result.message, 'error');
      }
    })
    .catch(error => {
      Swal.fire('ขัดข้อง', 'เชื่อมต่อระบบไม่ได้', 'error');
    })
    .finally(() => {
      btn.innerHTML = 'ยืนยันการส่งผล';
      btn.disabled = false;
    });
  });
</script>
</body>
</html>
