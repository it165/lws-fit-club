<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LWS FIT FOR HEALTH 2026</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; }
    .main-box { max-width: 450px; margin: 0 auto; padding: 20px; }
    .header-banner { background: linear-gradient(135deg, #198754, #20c997); color: white; border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(25,135,84,0.15); }
    .menu-btn { background-color: #ffffff; border: none; border-radius: 15px; padding: 20px; width: 100%; text-align: left; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: transform 0.1s; cursor: pointer; }
    .menu-btn:active { transform: scale(0.98); background-color: #f8f9fa; }
    .menu-icon { font-size: 28px; margin-right: 15px; width: 45px; height: 45px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div class="main-box">
    
    <div class="header-banner">
      <h4 class="fw-bold mb-1">LWS FIT FOR HEALTH CLUB</h4>
      <p class="mb-0 small opacity-75" id="welcomeText">กำลังโหลดข้อมูล LINE...</p>
    </div>

    <!-- เมนูทั้ง 5 ปุ่ม -->
    <div id="menuContainer" style="pointer-events: none; opacity: 0.6;">
      
      <!-- ตั้ง ID ให้ปุ่ม เพื่อให้ JavaScript สั่งล็อก/ปลดล็อกได้ -->
      <button id="btn-register" class="menu-btn" onclick="goToPage('register')">
        <span class="menu-icon bg-success bg-opacity-10 text-success">📝</span>
        <div>
          <h6 class="fw-bold mb-0 text-dark">ลงทะเบียนสมาชิก</h6>
          <small class="text-muted">กรอกข้อมูลผู้ใช้งานครั้งแรก</small>
        </div>
      </button>

      <button id="btn-profile" class="menu-btn" onclick="goToPage('profile')">
        <span class="menu-icon bg-primary bg-opacity-10 text-primary">👤</span>
        <div>
          <h6 class="fw-bold mb-0 text-dark">ข้อมูลส่วนตัวและคะแนน</h6>
          <small class="text-muted">เช็คพอยท์ ระดับสมาชิก และก้าวสะสม</small>
        </div>
      </button>

      <button id="btn-upload" class="menu-btn" onclick="goToPage('upload')">
        <span class="menu-icon bg-warning bg-opacity-10 text-warning">👣</span>
        <div>
          <h6 class="fw-bold mb-0 text-dark">ส่งผลก้าวเดินประจำวัน</h6>
          <small class="text-muted">อัปโหลดรูปภาพถ่ายให้ AI ตรวจสอบ</small>
        </div>
      </button>

      <button id="btn-reward" class="menu-btn" onclick="goToPage('redeem')"> <!-- เปลี่ยนเป็น redeem.html ให้ตรงกับที่เราสร้าง -->
        <span class="menu-icon bg-danger bg-opacity-10 text-danger">🎁</span>
        <div>
          <h6 class="fw-bold mb-0 text-dark">แลกของรางวัล</h6>
          <small class="text-muted">ใช้คะแนนสะสมแลกสิทธิพิเศษและสินค้า</small>
        </div>
      </button>

      <button id="btn-leaderboard" class="menu-btn" onclick="goToPage('leaderboard')">
        <span class="menu-icon bg-info bg-opacity-10 text-info">🏆</span>
        <div>
          <h6 class="fw-bold mb-0 text-dark">กระดานจัดอันดับ</h6>
          <small class="text-muted">ตรวจสอบรายชื่อ Top 20 นักเดินสูงสุด</small>
        </div>
      </button>

    </div>
  </div>

<script>
  // 🚨 ใส่ลิงก์ Deploy ของ Apps Script (GAS_URL) ของคุณที่นี่
  const GAS_URL = "ใส่_ลิงก์_APPS_SCRIPT_ที่ลงท้ายด้วย_/exec_ของคุณที่นี่"; 
  
  let currentUid = ''; 

  document.addEventListener("DOMContentLoaded", function() {
    const myLiffId = "2010703651-c2qp2DaT"; 
    const statusText = document.getElementById('welcomeText');

    liff.init({ liffId: myLiffId }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      liff.getProfile().then(profile => {
        currentUid = profile.userId; 
        
        statusText.innerText = "กำลังตรวจสอบข้อมูลของคุณ...";
        statusText.style.color = "#ffffff";
        statusText.style.fontWeight = "bold";
        
        // 🌟 เรียกฟังก์ชันเช็คกับ Google Sheets ว่าเคยลงทะเบียนหรือยัง
        checkRegistrationStatus(profile.displayName);
        
      }).catch(err => {
        statusText.innerText = "ดึงข้อมูลโปรไฟล์ไม่สำเร็จ";
      });

    }).catch(err => {
      statusText.innerText = "LIFF Error: " + err.message;
    });
  });

  // ฟังก์ชันคุยกับ Google Sheets
  function checkRegistrationStatus(displayName) {
    const statusText = document.getElementById('welcomeText');
    const menu = document.getElementById('menuContainer');

    fetch(GAS_URL, {
      method: 'POST',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getProfile", userId: currentUid })
    })
    .then(res => res.json())
    .then(result => {
      
      // ปลดล็อกคอนเทนเนอร์หลักก่อน
      menu.style.pointerEvents = "auto";
      menu.style.opacity = "1";
      statusText.innerText = "สวัสดีคุณ " + displayName;

      if (result.status === "success") {
        // ✅ เคยลงทะเบียนแล้ว -> ล็อกปุ่ม "ลงทะเบียนสมาชิก" ให้กดไม่ได้
        let regBtn = document.getElementById('btn-register');
        regBtn.style.backgroundColor = "#f1f3f5";
        regBtn.style.opacity = "0.7";
        regBtn.onclick = null; // ปิดการทำงานคลิก
        regBtn.querySelector('h6').innerText = "✅ ลงทะเบียนเรียบร้อยแล้ว";
        regBtn.querySelector('small').innerText = "พบข้อมูลของคุณในระบบแล้ว";
        regBtn.querySelector('.menu-icon').innerText = "🔒";
        // ปุ่มอื่นๆ สามารถกดได้ตามปกติ
      } else {
        // ❌ ยังไม่เคยลงทะเบียน -> ล็อกปุ่มอื่นๆ ทั้งหมด ให้กดได้แค่ปุ่มลงทะเบียน
        let otherBtns = ['btn-profile', 'btn-upload', 'btn-reward', 'btn-leaderboard'];
        otherBtns.forEach(id => {
          let btn = document.getElementById(id);
          btn.style.opacity = "0.5";
          btn.onclick = function() {
            alert("⚠️ กรุณาลงทะเบียนสมาชิกก่อนเข้าใช้งานเมนูนี้ครับ");
          };
        });
      }
    })
    .catch(error => {
      statusText.innerText = "❌ ตรวจสอบข้อมูลไม่สำเร็จ โปรดลองใหม่";
    });
  }

  // ฟังก์ชันสลับหน้าเว็บ (ส่ง UID แปะไปกับลิงก์ด้วย)
  function goToPage(pageName) {
    if (!currentUid) {
      alert("กำลังรอเชื่อมต่อข้อมูล LINE กรุณารอสักครู่ครับ");
      return;
    }
    window.location.href = pageName + ".html?uid=" + currentUid;
  }
</script>
</body>
</html>
