<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>หน้าหลัก - LWS FIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- เพิ่ม LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 40px; padding-top: 30px; }
    .container { max-width: 480px !important; margin: 0 auto; padding: 0 15px; }
    
    .menu-btn { 
      width: 100%; border-radius: 12px; padding: 15px; font-weight: bold; font-size: 16px; 
      border: none; margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
      transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .menu-btn:active { transform: scale(0.98); }
    
    .btn-register { background: linear-gradient(135deg, #0d6efd, #0b5ed7); color: white; }
    .btn-upload { background: linear-gradient(135deg, #198754, #157347); color: white; }
    .btn-profile { background: linear-gradient(135deg, #6f42c1, #59339d); color: white; }
    .btn-leaderboard { background: linear-gradient(135deg, #fd7e14, #e85e0c); color: white; }
    .btn-redeem { background: linear-gradient(135deg, #f59f00, #d9480f); color: white; }
    
    .menu-btn:disabled { background: #e9ecef; color: #adb5bd; cursor: not-allowed; box-shadow: none; transform: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="text-center mb-4">
    <h2 class="fw-bold text-success">LWS FIT</h2>
    <p class="text-muted" style="font-size: 15px;">ก้าวเพื่อสุขภาพ สะสมพอยท์แลกของรางวัล</p>
  </div>

  <!-- สถานะโหลดข้อมูล -->
  <div id="loadingStatus" class="text-center text-primary mb-3 fw-bold" style="font-size: 14px;">
    <span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบข้อมูล LINE ของคุณ...
  </div>

  <!-- ปุ่มเมนูต่างๆ -->
  <button id="menuRegister" class="menu-btn btn-register" onclick="goTo('register.html')" disabled>📝 ลงทะเบียนเข้าร่วม</button>
  <button id="menuUpload" class="menu-btn btn-upload" onclick="goTo('upload.html')" disabled>📸 ส่งผลก้าวเดิน</button>
  <button id="menuProfile" class="menu-btn btn-profile" onclick="goTo('profile.html')" disabled>👤 โปรไฟล์ของฉัน</button>
  <button id="menuLeaderboard" class="menu-btn btn-leaderboard" onclick="goTo('leaderboard.html')" disabled>🏆 กระดานจัดอันดับ</button>
  <button id="menuRedeem" class="menu-btn btn-redeem" onclick="goTo('redeem.html')" disabled>🎁 แลกของรางวัล</button>
</div>

<script>
  // 🚨 ใส่ลิงก์ Deploy ของคุณตรงนี้
  const GAS_URL = "ใส่_ลิงก์_APPS_SCRIPT_ที่ลงท้ายด้วย_/exec_ของคุณที่นี่"; 
  
  // 🚨 ใส่ LIFF ID ของคุณ (ถ้ามี) ถ้ายังไม่มีไม่เป็นไรครับ ปล่อยว่างไว้ก่อนได้
  const LIFF_ID = ""; 

  let currentUid = "";

  window.onload = function() {
    // ถ้าระบุ LIFF ID ไว้ ให้ดึงข้อมูลจาก LINE
    if (LIFF_ID && LIFF_ID !== "") {
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            currentUid = profile.userId;
            checkRegistration();
          });
        } else {
          liff.login();
        }
      }).catch(err => {
        fallbackCheck();
      });
    } else {
      // ถ้าไม่ได้ใส่ LIFF ID จะใช้วิธีอ่านค่าจาก URL (สำหรับทดสอบ)
      fallbackCheck();
    }
  };

  function fallbackCheck() {
    const urlParams = new URLSearchParams(window.location.search);
    currentUid = urlParams.get('uid');
    
    if(!currentUid) {
      document.getElementById('loadingStatus').innerHTML = "<span class='text-danger'>❌ ไม่พบข้อมูล UID<br><small>สำหรับการทดสอบ กรุณาพิมพ์ ?uid=123 ต่อท้ายลิงก์เว็บ</small></span>";
      return;
    }
    checkRegistration();
  }

  function checkRegistration() {
    fetch(GAS_URL, {
      method: 'POST',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getProfile", userId: currentUid })
    })
    .then(res => res.json())
    .then(result => {
      document.getElementById('loadingStatus').style.display = 'none';

      if (result.status === "success") {
        let regBtn = document.getElementById('menuRegister');
        regBtn.disabled = true;
        regBtn.innerHTML = "✅ ลงทะเบียนเรียบร้อยแล้ว";
        
        document.getElementById('menuUpload').disabled = false;
        document.getElementById('menuProfile').disabled = false;
        document.getElementById('menuLeaderboard').disabled = false;
        document.getElementById('menuRedeem').disabled = false;
      } else {
        document.getElementById('menuRegister').disabled = false;
      }
    })
    .catch(error => {
      document.getElementById('loadingStatus').innerHTML = "<span class='text-danger'>❌ การเชื่อมต่อขัดข้อง โปรดรีเฟรชหน้าจอ</span>";
    });
  }

  function goTo(page) {
    if(currentUid) {
      window.location.href = page + "?uid=" + currentUid;
    }
  }
</script>
</body>
</html>
