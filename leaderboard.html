<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leaderboard - LWS FIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 40px; padding-top: 20px; }
    .container { max-width: 480px !important; margin: 0 auto; padding: 0 15px; }
    
    .header-box { background: linear-gradient(135deg, #0d6efd, #0b5ed7); border-radius: 16px; padding: 25px 20px; color: white; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(13, 110, 253, 0.2); }
    
    .rank-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); position: relative; overflow: hidden; }
    
    /* ตกแต่งอันดับ 1-3 เป็นพิเศษ */
    .rank-1 { border: 2px solid #ffc107; background: #fffcf2; }
    .rank-2 { border: 2px solid #adb5bd; background: #f8f9fa; }
    .rank-3 { border: 2px solid #d38c44; background: #fdfaf7; }
    
    .rank-number { width: 35px; font-size: 18px; font-weight: bold; text-align: center; color: #6c757d; }
    .rank-1 .rank-number { font-size: 24px; color: #ffc107; }
    .rank-2 .rank-number { font-size: 22px; color: #adb5bd; }
    .rank-3 .rank-number { font-size: 20px; color: #d38c44; }

    /* 🌟 รูปโปรไฟล์ Avatar */
    .avatar-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 12px; background-color: #eee; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    
    .user-info { flex-grow: 1; overflow: hidden; }
    .user-name { font-weight: bold; font-size: 15px; color: #333; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    /* 🌟 ป้ายแรงค์ */
    .tier-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; color: white; display: inline-block; margin-bottom: 3px; }
    
    .user-project { font-size: 12px; color: #6c757d; }
    .step-count { font-size: 18px; font-weight: bold; color: #198754; text-align: right; white-space: nowrap; }
    
    .btn-back { background-color: #e9ecef; color: #495057; border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; border: none; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header-box">
    <h3 class="fw-bold mb-1">🏆 TOP 20</h3>
    <div style="font-size: 14px; opacity: 0.9;">กระดานจัดอันดับ</div>
  </div>

  <div id="leaderboardList">
    <div class="text-center text-muted mt-5">
      <div class="spinner-border text-primary mb-2" role="status"></div>
      <div>กำลังโหลดข้อมูลจัดอันดับ...</div>
    </div>
  </div>

  <button type="button" class="btn-back mt-4" onclick="goBack()">กลับหน้าหลัก</button>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const currentUid = urlParams.get('uid');
  
  // 🚨 ใส่ลิงก์ Deploy ของคุณตรงนี้
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw0jdlT9JewPZLbAOtKvdpE3bxFkMM6qXFRWoWZH5RmDgxt3w_A9nUrV1uJ_cNJFFW6qA/exec"; 

  window.onload = function() {
    loadLeaderboard();
  };

  function loadLeaderboard() {
    fetch(GAS_URL, {
      method: 'POST',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "getLeaderboard" })
    })
    .then(res => res.json())
    .then(result => {
      let listContainer = document.getElementById('leaderboardList');
      listContainer.innerHTML = "";
      
      if (result.status === "success" && result.data.length > 0) {
        
        result.data.forEach((user, index) => {
          let rank = index + 1;
          let rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
          let rankIcon = rank === 1 ? '👑' : rank;
          
          // 🌟 สร้าง Avatar อัตโนมัติจากชื่อ
          let avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random&color=fff&size=100&font-size=0.4`;

          let card = `
            <div class="rank-card ${rankClass}">
              <div class="rank-number">${rankIcon}</div>
              <img src="${avatarUrl}" class="avatar-img" alt="Avatar">
              <div class="user-info">
                <div class="user-name">${user.name}</div>
                <div class="tier-badge" style="background: ${user.tierColor}">${user.tier}</div>
                <div class="user-project">${user.project}</div>
              </div>
              <div class="step-count">
                ${user.steps.toLocaleString()}<br>
                <small class="text-muted" style="font-size: 11px;">ก้าว</small>
              </div>
            </div>
          `;
          listContainer.innerHTML += card;
        });

      } else {
        listContainer.innerHTML = '<div class="text-center text-muted mt-4">ยังไม่มีข้อมูลการเดินในขณะนี้</div>';
      }
    })
    .catch(error => {
      document.getElementById('leaderboardList').innerHTML = '<div class="text-center text-danger mt-4">❌ โหลดข้อมูลไม่สำเร็จ โปรดลองใหม่</div>';
    });
  }

  function goBack() {
    if(currentUid) {
      window.location.href = 'index.html?uid=' + currentUid;
    } else {
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
