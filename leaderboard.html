<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>กระดานจัดอันดับ - LWS FIT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; padding-bottom: 40px; -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-tap-highlight-color: transparent; }
    
    .container { max-width: 480px !important; margin: 0 auto; padding: 0 15px; }
    .header-banner { background: linear-gradient(135deg, #ffc107, #ff9800); color: white; border-radius: 16px; padding: 25px 20px; text-align: center; margin-top: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,152,0,0.2); }
    
    .rank-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: none; }
    .rank-number { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; margin-right: 15px; flex-shrink: 0; }
    
    /* สีพิเศษสำหรับ Top 3 */
    .rank-1 { background-color: #ffd700; color: #855a00; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
    .rank-2 { background-color: #c0c0c0; color: #4a4a4a; }
    .rank-3 { background-color: #cd7f32; color: #5c3a21; }
    .rank-normal { background-color: #f8f9fa; color: #6c757d; border: 1px solid #dee2e6; }
    
    .user-info { flex-grow: 1; }
    .user-name { font-weight: bold; color: #212529; margin-bottom: 0; font-size: 16px; }
    .user-project { font-size: 12px; color: #6c757d; margin-bottom: 0; }
    .step-count { font-weight: bold; color: #198754; font-size: 18px; text-align: right; }
    .step-label { font-size: 10px; color: #6c757d; display: block; text-align: right; margin-top: -3px; }

    .btn-back { background-color: #e9ecef; color: #495057; width: 100%; margin-top: 15px; border-radius: 12px; padding: 12px; font-weight: bold; border: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header-banner">
    <h1 class="mb-0">🏆</h1>
    <h4 class="fw-bold mt-2 mb-0">TOP 20 LEADERBOARD</h4>
    <small class="opacity-75">นักเดินที่ก้าวเยอะที่สุดในโครงการ</small>
  </div>

  <div id="loading" class="text-center my-5">
    <div class="spinner-border text-warning" role="status"></div>
    <p class="mt-3 text-muted fw-bold">กำลังคำนวณอันดับ...</p>
  </div>

  <!-- กล่องแสดงรายชื่อ -->
  <div id="leaderboardList" style="display: none;"></div>

  <button type="button" class="btn-back" onclick="window.location.href='index.html'">กลับหน้าแรก</button>
</div>

<script>
  // 🚨 ใส่ลิงก์ Deploy ของคุณตรงนี้
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw0jdlT9JewPZLbAOtKvdpE3bxFkMM6qXFRWoWZH5RmDgxt3w_A9nUrV1uJ_cNJFFW6qA/exec"; 

  window.onload = function() {
    fetchLeaderboard();
  };

  function fetchLeaderboard() {
    const payload = { action: "getLeaderboard" };

    fetch(GAS_URL, {
      redirect: "follow",
      method: 'POST',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(result => {
      document.getElementById('loading').style.display = 'none';
      const listContainer = document.getElementById('leaderboardList');
      listContainer.style.display = 'block';

      if (result.status === "success" && result.data.length > 0) {
        let htmlContent = "";
        
        result.data.forEach((user, index) => {
          let rank = index + 1;
          let rankClass = "rank-normal";
          let medal = rank;

          if (rank === 1) { rankClass = "rank-1"; medal = "🥇"; }
          else if (rank === 2) { rankClass = "rank-2"; medal = "🥈"; }
          else if (rank === 3) { rankClass = "rank-3"; medal = "🥉"; }

          // จัด Format ตัวเลขให้มีลูกน้ำ (เช่น 10000 -> 10,000)
          let formattedSteps = Number(user.steps).toLocaleString();

          htmlContent += `
            <div class="rank-card">
              <div class="rank-number ${rankClass}">${medal}</div>
              <div class="user-info">
                <p class="user-name">${user.name}</p>
                <p class="user-project">${user.project}</p>
              </div>
              <div>
                <div class="step-count">${formattedSteps}</div>
                <span class="step-label">ก้าว</span>
              </div>
            </div>
          `;
        });
        
        listContainer.innerHTML = htmlContent;
      } else {
        listContainer.innerHTML = `<div class="alert alert-warning text-center">ยังไม่มีข้อมูลการก้าวเดินในระบบครับ</div>`;
      }
    })
    .catch(error => {
      document.getElementById('loading').innerHTML = `<p class="text-danger">ขัดข้อง: ไม่สามารถดึงข้อมูลได้</p>`;
    });
  }
</script>
</body>
</html>
